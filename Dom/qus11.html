<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .active{
            background: rgb(108, 236, 108);
        }
        button{
            height: 50px;
            width: 70px;
        }
    </style>
</head>
<body>
    <!-- toggle a class name=active on a button when clicked use classList.toggle() -->
    <button> hello </button>

    <script>
        let btn = document.querySelector("button");
        btn.addEventListener('click', ()=>{
            btn.classList.toggle("active")
        })
    </script>
</body>
</html>
